# 质量门禁工作流
# 在 PR 和 push 时运行代码质量检查，阻塞不合规代码合并

name: Quality Gate

on:
  pull_request:
    branches: [main, master, develop]
  push:
    branches: [main, master, develop]

jobs:
  # 1. 前端代码质量检查
  frontend-quality:
    name: Frontend Quality Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Biome 代码检查
      - name: Run Biome check
        run: npx biome check --no-errors-on-unmatched --files-ignore-unknown=true .

      # TypeScript 类型检查
      - name: Run TypeScript check
        run: npx tsc --noEmit

      # 高风险架构边界改动时，必须同步更新架构文档
      - name: Check architecture doc sync
        run: node scripts/check-architecture-doc-sync.js

      # 测试运行（smoke test）
      - name: Run tests
        run: npm test -- --run

  # 2. Python 代码质量检查（auth-api）
  python-quality:
    name: Python Quality Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 安装 auth-api 依赖
      - name: Install dependencies
        working-directory: ./auth-api
        run: |
          pip install -r requirements.txt

      # Python 语法检查
      - name: Python syntax check
        working-directory: ./auth-api
        run: |
          python -m py_compile main.py config.py deps.py models.py schemas.py sms_service.py
          python -m py_compile auth_feature_rules.py subscription_rules.py
          find routers -name "*.py" -exec python -m py_compile {} \;

      # FastAPI 应用能否正常导入（冒烟测试）
      - name: FastAPI import check
        working-directory: ./auth-api
        run: |
          python -c "from main import app; print('FastAPI app imported successfully')"
        env:
          JWT_SECRET: test-secret-for-ci-32-bytes-minimum-key
          DATABASE_URL: sqlite:///tmp/test.db

      # 稳定单测
      - name: Run Python unit tests
        working-directory: ./auth-api
        run: |
          python -m unittest test_auth_feature_rules.py test_subscription_rules.py test_subscription_system.py test_single_session_enforcement.py

  # 3. 依赖漏洞扫描（阻断高风险依赖进入主分支）
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install frontend dependencies
        run: npm ci

      - name: Run npm audit
        run: npm run audit:npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install auth-api dependencies and pip-audit
        working-directory: ./auth-api
        run: |
          python -m pip install -r requirements.txt
          python -m pip install pip-audit

      - name: Run pip-audit
        working-directory: ./auth-api
        run: |
          python -m pip_audit -r requirements.txt
