# 质量门禁工作流
# 在 PR 和 push 时运行代码质量检查，阻塞不合规代码合并

name: Quality Gate

on:
  pull_request:
    branches: [main, master, develop]
  push:
    branches: [main, master, develop]

jobs:
  # 1. 前端代码质量检查
  frontend-quality:
    name: Frontend Quality Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Biome 代码检查
      - name: Run Biome check
        run: npx biome check --no-errors-on-unmatched --files-ignore-unknown=true .

      # TypeScript 类型检查
      - name: Run TypeScript check
        run: npx tsc --noEmit

      # 高风险架构边界改动时，必须同步更新架构文档
      - name: Check architecture doc sync
        run: node scripts/check-architecture-doc-sync.js

      # 测试运行（smoke test）
      - name: Run tests
        run: npm test -- --run

  # 2. Shell 脚本语法检查（deploy）
  shell-quality:
    name: Shell Script Quality Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run shell syntax check
        run: bash -n deploy/*.sh

  # 3. Python 代码质量检查（auth-api）
  python-quality:
    name: Python Quality Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create auth-api virtualenv
        run: npm run auth:venv

      - name: Run auth-api check suite
        run: npm run auth:check

  # 4. 依赖漏洞扫描（阻断高风险依赖进入主分支）
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install frontend dependencies
        run: npm ci

      - name: Run npm audit
        run: npm run audit:npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install auth-api dependencies and pip-audit
        working-directory: ./auth-api
        run: |
          python -m pip install -r requirements.txt
          python -m pip install pip-audit

      - name: Run pip-audit
        working-directory: ./auth-api
        run: |
          python -m pip_audit -r requirements.txt
