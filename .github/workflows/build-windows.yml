# 秀儿直播助手 - Windows 构建工作流
# 专门用于在 GitHub Actions 上构建 Windows 安装包
#
# 触发方式：
# 1. 推送 v* 标签（如 v1.2.1）
# 2. 手动触发 workflow_dispatch
#
# 注意：本工作流仅构建 Windows 版本，macOS 请在本地构建

name: Build Windows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish:
        description: '发布到 GitHub Release'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  # 生产环境 API 地址
  VITE_AUTH_API_BASE_URL: http://121.41.179.197:8000

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: windows-latest

    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3. 检查环境
      - name: Check environment
        run: |
          node --version
          npm --version
          echo "VITE_AUTH_API_BASE_URL=$env:VITE_AUTH_API_BASE_URL"

      # 4. 安装依赖
      - name: Install dependencies
        run: npm install

      # 5. 运行发布防事故检查
      - name: Release Guard Check
        run: npm run release:guard
        env:
          VITE_AUTH_API_BASE_URL: ${{ env.VITE_AUTH_API_BASE_URL }}

      # 6. 清理构建目录
      - name: Clean dist directory
        run: npm run dist:clean

      # 7. 构建应用
      - name: Build application
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          VITE_AUTH_API_BASE_URL: ${{ env.VITE_AUTH_API_BASE_URL }}

      # 8. 打包 Windows 安装包
      - name: Build Windows installer
        run: npx electron-builder --win nsis zip --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 9. 上传构建产物为 Artifact
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            release/**/*.exe
            release/**/*.zip
            release/**/latest.yml

      # 10. 发布到 GitHub Release（仅 tag 触发时）
      - name: Release to GitHub
        if: startsWith(github.ref, 'refs/tags/v')
        run: npx electron-builder --win nsis zip --x64 --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
