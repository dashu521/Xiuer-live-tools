# 秀儿直播助手 - Windows 构建工作流（增强版）
# 专门用于在 GitHub Actions 上构建 Windows 安装包并自动发布到 GitHub Release
#
# 触发方式：
# 1. 推送 v* 标签（如 v1.2.1）- 自动构建并发布到 Release
# 2. 手动触发 workflow_dispatch - 仅构建，不自动发布
#
# 注意：
# - 本工作流仅构建 Windows 版本
# - macOS 版本请在本地 Mac 构建（任意 Apple Silicon 或 Intel Mac 均可）
# - 详见 docs/RELEASE_SPECIFICATION.md 中的三层发布结构

name: Build Windows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish:
        description: '发布到 GitHub Release'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  # 生产环境 API 地址
  VITE_AUTH_API_BASE_URL: http://121.41.179.197:8000

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: windows-latest

    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3. 检查环境
      - name: Check environment
        run: |
          node --version
          npm --version
          echo "VITE_AUTH_API_BASE_URL=$env:VITE_AUTH_API_BASE_URL"

      # 4. 安装依赖
      - name: Install dependencies
        run: npm install

      # 5. 运行发布防事故检查
      - name: Release Guard Check
        run: npm run release:guard
        env:
          VITE_AUTH_API_BASE_URL: ${{ env.VITE_AUTH_API_BASE_URL }}

      # 6. 清理构建目录
      - name: Clean dist directory
        run: npm run dist:clean

      # 7. 构建应用
      - name: Build application
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          VITE_AUTH_API_BASE_URL: ${{ env.VITE_AUTH_API_BASE_URL }}

      # 8. 打包 Windows 安装包（不发布）
      - name: Build Windows installer
        run: npx electron-builder --win nsis zip --x64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 9. 上传构建产物为 Artifact（始终上传，便于调试）
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            release/**/Xiuer-Live-Assistant_*.exe
            release/**/*.zip
            release/**/latest.yml
            release/**/*.blockmap

      # 10. 自动上传到 GitHub Release（仅 tag 触发时）
      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release/**/Xiuer-Live-Assistant_*.exe
            release/**/*.zip
            release/**/latest.yml
            release/**/*.blockmap
          fail_on_unmatched_files: false
          # 如果 Release 不存在，自动创建
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 11. 安装并配置 ossutil，然后上传 OSS
      # 合并为一个 step 避免 secrets 传递问题
      - name: Install ossutil and upload to OSS
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
        run: |
          # 检查 secrets 是否设置
          if ([string]::IsNullOrEmpty($env:ALIYUN_ACCESS_KEY_ID) -or [string]::IsNullOrEmpty($env:ALIYUN_ACCESS_KEY_SECRET)) {
            Write-Host "⚠️  阿里云 Secrets 未设置，跳过 OSS 上传"
            Write-Host "如需上传 OSS，请在仓库 Settings -> Secrets 中设置:"
            Write-Host "  - ALIYUN_ACCESS_KEY_ID"
            Write-Host "  - ALIYUN_ACCESS_KEY_SECRET"
            exit 0
          }

          # 安装 ossutil
          Write-Host "========================================"
          Write-Host "安装 ossutil"
          Write-Host "========================================"
          $ossutilUrl = "https://gosspublic.alicdn.com/ossutil/1.7.16/ossutil64.zip"
          Invoke-WebRequest -Uri $ossutilUrl -OutFile "ossutil.zip"
          Expand-Archive -Path "ossutil.zip" -DestinationPath "." -Force

          # 查找 ossutil 可执行文件
          $ossutilExe = $null
          if (Test-Path ".\ossutil64\ossutil64.exe") {
            $ossutilExe = ".\ossutil64\ossutil64.exe"
          } elseif (Test-Path ".\ossutil64.exe") {
            $ossutilExe = ".\ossutil64.exe"
          } else {
            # 搜索当前目录
            $found = Get-ChildItem -Path "." -Filter "ossutil64.exe" -Recurse | Select-Object -First 1
            if ($found) {
              $ossutilExe = $found.FullName
            }
          }

          if (-not $ossutilExe) {
            Write-Host "❌ 找不到 ossutil64.exe"
            Write-Host "当前目录结构:"
            Get-ChildItem -Path "." -Recurse | Where-Object { $_.Name -like "*ossutil*" } | Select-Object -ExpandProperty FullName
            exit 1
          }

          Write-Host "✅ 找到 ossutil: $ossutilExe"

          # 配置 ossutil
          Write-Host ""
          Write-Host "========================================"
          Write-Host "配置 ossutil"
          Write-Host "========================================"
          & $ossutilExe config -e oss-cn-hangzhou.aliyuncs.com -i $env:ALIYUN_ACCESS_KEY_ID -k $env:ALIYUN_ACCESS_KEY_SECRET -L CH
          if ($LASTEXITCODE -ne 0) {
            Write-Host "❌ OSS 配置失败"
            exit 1
          }
          Write-Host "✅ OSS 配置成功"

          # 上传构建产物到 OSS
          $version = "${{ github.ref_name }}"
          $localPath = "release\$version"
          $versionedPath = "oss://xiuer-live-tools-download/releases/$version/"
          $latestPath = "oss://xiuer-live-tools-download/releases/latest/"

          # 检查本地路径
          if (-not (Test-Path $localPath)) {
            Write-Host ""
            Write-Host "❌ 本地路径不存在: $localPath"
            Write-Host "release 目录内容:"
            if (Test-Path "release") {
              Get-ChildItem -Path "release" -Recurse | Select-Object -ExpandProperty FullName
            }
            exit 1
          }

          # 上传到版本目录
          Write-Host ""
          Write-Host "========================================"
          Write-Host "上传到版本目录: $versionedPath"
          Write-Host "========================================"
          & $ossutilExe cp $localPath $versionedPath -r -f
          if ($LASTEXITCODE -ne 0) {
            Write-Host "❌ 上传到版本目录失败"
            exit 1
          }
          Write-Host "✅ 版本目录上传成功"

          # 清空并更新 latest 目录
          Write-Host ""
          Write-Host "========================================"
          Write-Host "更新 latest 目录"
          Write-Host "========================================"
          & $ossutilExe rm $latestPath -r -f
          if ($LASTEXITCODE -ne 0) {
            Write-Host "⚠️  清空 latest 目录警告（可能目录不存在）"
          }

          & $ossutilExe cp $localPath $latestPath -r -f
          if ($LASTEXITCODE -ne 0) {
            Write-Host "❌ 上传到 latest 目录失败"
            exit 1
          }
          Write-Host "✅ latest 目录更新成功"

          # 上传 latest.yml 到根目录
          $ymlPath = "$localPath\latest.yml"
          if (Test-Path $ymlPath) {
            & $ossutilExe cp $ymlPath "oss://xiuer-live-tools-download/releases/latest.yml" -f
            if ($LASTEXITCODE -eq 0) {
              Write-Host "✅ latest.yml 上传成功"
            } else {
              Write-Host "⚠️  latest.yml 上传失败"
            }
          }

          Write-Host ""
          Write-Host "========================================"
          Write-Host "OSS 上传完成"
          Write-Host "========================================"
          Write-Host "版本目录: https://xiuer.work/releases/$version/"
          Write-Host "Latest:   https://xiuer.work/releases/latest/"

      # 12. 输出下载地址
      - name: Output download URL
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          Write-Host "========================================"
          Write-Host "Build completed successfully!"
          Write-Host "========================================"
          Write-Host "GitHub Release: https://github.com/${{ github.repository }}/releases/tag/$version"
          Write-Host ""
          Write-Host "Download URLs:"
          Write-Host "  GitHub:  https://github.com/${{ github.repository }}/releases/tag/$version"
          Write-Host "  Version: https://xiuer.work/releases/$version/"
          Write-Host "  Latest:  https://xiuer.work/releases/latest/"
          Write-Host "========================================"
