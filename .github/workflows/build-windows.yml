# 秀儿直播助手 - Windows 构建工作流（增强版）
# 专门用于在 GitHub Actions 上构建 Windows 安装包并自动发布到 GitHub Release
#
# 触发方式：
# 1. 推送 v* 标签（如 v1.2.1）- 自动构建并发布到 Release
# 2. 手动触发 workflow_dispatch - 仅构建，不自动发布
#
# 注意：
# - 本工作流仅构建 Windows 版本
# - macOS 版本请在本地 Mac 构建（任意 Apple Silicon 或 Intel Mac 均可）
# - 详见 docs/RELEASE_SPECIFICATION.md 中的三层发布结构

name: Build Windows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish:
        description: '发布到 GitHub Release'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  # 生产环境 API 地址
  VITE_AUTH_API_BASE_URL: http://121.41.179.197:8000
  # 阿里云 OSS 配置
  ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
  ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: windows-latest

    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3. 检查环境
      - name: Check environment
        run: |
          node --version
          npm --version
          echo "VITE_AUTH_API_BASE_URL=$env:VITE_AUTH_API_BASE_URL"

      # 4. 安装依赖
      - name: Install dependencies
        run: npm install

      # 5. 运行发布防事故检查
      - name: Release Guard Check
        run: npm run release:guard
        env:
          VITE_AUTH_API_BASE_URL: ${{ env.VITE_AUTH_API_BASE_URL }}

      # 6. 清理构建目录
      - name: Clean dist directory
        run: npm run dist:clean

      # 7. 构建应用
      - name: Build application
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          VITE_AUTH_API_BASE_URL: ${{ env.VITE_AUTH_API_BASE_URL }}

      # 8. 打包 Windows 安装包（不发布）
      - name: Build Windows installer
        run: npx electron-builder --win nsis zip --x64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 9. 上传构建产物为 Artifact（始终上传，便于调试）
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            release/**/Xiuer-Live-Assistant_*.exe
            release/**/*.zip
            release/**/latest.yml
            release/**/*.blockmap

      # 10. 自动上传到 GitHub Release（仅 tag 触发时）
      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release/**/Xiuer-Live-Assistant_*.exe
            release/**/*.zip
            release/**/latest.yml
            release/**/*.blockmap
          fail_on_unmatched_files: false
          # 如果 Release 不存在，自动创建
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 11. 安装 ossutil
      - name: Install ossutil
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $ossutilUrl = "https://gosspublic.alicdn.com/ossutil/1.7.16/ossutil64.zip"
          Invoke-WebRequest -Uri $ossutilUrl -OutFile "ossutil.zip"
          Expand-Archive -Path "ossutil.zip" -DestinationPath "." -Force

      # 12. 配置 OSS
      - name: Configure OSS
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          .\ossutil64\ossutil64.exe config -e oss-cn-hangzhou.aliyuncs.com -i $env:ALIYUN_ACCESS_KEY_ID -k $env:ALIYUN_ACCESS_KEY_SECRET -L CH

      # 13. 上传构建产物到 OSS - 版本目录
      - name: Upload build to OSS (versioned)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $localPath = "release\$version"
          $remotePath = "oss://xiuer-live-tools-download/releases/$version/"

          Write-Host "========================================"
          Write-Host "Uploading to versioned path: $remotePath"
          Write-Host "========================================"
          .\ossutil64\ossutil64.exe cp $localPath $remotePath -r -f

          # 验证上传
          Write-Host "Uploaded files:"
          .\ossutil64\ossutil64.exe ls $remotePath

      # 14. 上传构建产物到 OSS - latest 目录（仅 tag 构建）
      - name: Upload build to OSS (latest)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $localPath = "release\$version"
          $latestPath = "oss://xiuer-live-tools-download/releases/latest/"

          Write-Host "========================================"
          Write-Host "Uploading to latest path: $latestPath"
          Write-Host "========================================"

          # 清空 latest 目录并重新上传
          .\ossutil64\ossutil64.exe rm $latestPath -r -f
          .\ossutil64\ossutil64.exe cp $localPath $latestPath -r -f

          # 同时上传 latest.yml 到根目录（用于自动更新）
          .\ossutil64\ossutil64.exe cp "$localPath\latest.yml" "oss://xiuer-live-tools-download/releases/latest.yml" -f

          Write-Host "Latest directory updated successfully"

      # 15. 输出下载地址
      - name: Output download URL
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          Write-Host "========================================"
          Write-Host "Build completed successfully!"
          Write-Host "========================================"
          Write-Host "GitHub Release: https://github.com/${{ github.repository }}/releases/tag/$version"
          Write-Host ""
          Write-Host "OSS Download URLs:"
          Write-Host "  Versioned: https://xiuer.work/releases/$version/"
          Write-Host "  Latest:    https://xiuer.work/releases/latest/"
          Write-Host ""
          Write-Host "Direct OSS URLs:"
          Write-Host "  https://xiuer-live-tools-download.oss-cn-hangzhou.aliyuncs.com/releases/$version/"
          Write-Host "  https://xiuer-live-tools-download.oss-cn-hangzhou.aliyuncs.com/releases/latest/"
          Write-Host "========================================"
