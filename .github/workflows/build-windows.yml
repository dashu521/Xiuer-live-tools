# 秀儿直播助手 - Windows 构建工作流（平台隔离版）
# 专门用于在 GitHub Actions 上构建 Windows 安装包并自动发布到 GitHub Release
#
# 触发方式：
# 1. 推送 v* 标签（如 v1.2.1）- 自动构建并发布到 Release + OSS
# 2. 手动触发 workflow_dispatch - 构建并上传 OSS，便于验证链路
# 3. main 分支 push - 仅构建，不发布
#
# 平台隔离保证：
# - 本工作流仅构建 Windows 版本，绝不触发 Mac 签名/公证
# - 使用 electron-builder --win 明确指定目标平台
# - afterSign 钩子中的 notarize.cjs 会检查平台并跳过非 Mac 构建
# - 详见 docs/RELEASE_SPECIFICATION.md 中的三层发布结构

name: Build Windows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish:
        description: '发布到 GitHub Release'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  # 生产环境 API 地址
  VITE_AUTH_API_BASE_URL: http://121.41.179.197:8000
  # 明确指定构建目标，防止串台
  ELECTRON_BUILDER_TARGETS: win32

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: windows-latest

    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v5

      # 2. 设置 Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      # 3. 检查环境
      - name: Check environment
        run: |
          node --version
          npm --version
          echo "VITE_AUTH_API_BASE_URL=$env:VITE_AUTH_API_BASE_URL"
          echo "ELECTRON_BUILDER_TARGETS=$env:ELECTRON_BUILDER_TARGETS"
          echo "Platform: Windows"

      # 4. 安装依赖
      - name: Install dependencies
        run: npm install

      # 5. 运行发布防事故检查
      - name: Release Guard Check
        run: npm run release:guard
        env:
          VITE_AUTH_API_BASE_URL: ${{ env.VITE_AUTH_API_BASE_URL }}

      # 5.5 Windows 构建配置验证
      - name: Validate Windows Build Config
        run: npm run dist:validate

      # 6. 清理构建目录
      - name: Clean dist directory
        run: npm run dist:clean

      # 7. 构建应用
      - name: Build application
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          VITE_AUTH_API_BASE_URL: ${{ env.VITE_AUTH_API_BASE_URL }}

      # 8. 打包 Windows 安装包（明确指定 --win，绝不触发 Mac 签名）
      - name: Build Windows installer
        run: npx electron-builder --win nsis zip --x64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON_BUILDER_TARGETS: win32

      # 9. 验证构建产物（确保没有 Mac 产物）
      - name: Verify build artifacts
        shell: pwsh
        run: |
          Write-Host "========================================"
          Write-Host "验证构建产物"
          Write-Host "========================================"

          # 检查 release 目录
          $releaseDir = "release"
          if (Test-Path $releaseDir) {
            $allFiles = Get-ChildItem -Path $releaseDir -Recurse -File

            # 检查 Windows 产物
            $exeFiles = $allFiles | Where-Object { $_.Extension -eq ".exe" }
            $zipFiles = $allFiles | Where-Object { $_.Extension -eq ".zip" }
            $ymlFiles = $allFiles | Where-Object { $_.Name -eq "latest.yml" }

            Write-Host "Windows 产物:"
            $exeFiles | ForEach-Object { Write-Host "  - $($_.Name)" }
            $zipFiles | ForEach-Object { Write-Host "  - $($_.Name)" }
            $ymlFiles | ForEach-Object { Write-Host "  - $($_.Name)" }

            # 检查是否有 Mac 产物（不应该存在）
            $macFiles = $allFiles | Where-Object {
              $_.Extension -eq ".dmg" -or
              $_.Extension -eq ".pkg" -or
              $_.Name -eq "latest-mac.yml"
            }

            if ($macFiles.Count -gt 0) {
              Write-Host "ERROR: 发现 Mac 产物（不应该存在）:"
              $macFiles | ForEach-Object { Write-Host "  - $($_.FullName)" }
              exit 1
            } else {
              Write-Host "✅ 没有发现 Mac 产物"
            }

            # 检查是否有签名相关文件
            $signedFiles = $allFiles | Where-Object { $_.Name -like "*signed*" -or $_.Name -like "*notarize*" }
            if ($signedFiles.Count -gt 0) {
              Write-Host "发现签名相关文件:"
              $signedFiles | ForEach-Object { Write-Host "  - $($_.Name)" }
            }
          } else {
            Write-Host "ERROR: release 目录不存在"
            exit 1
          }

          Write-Host "========================================"
          Write-Host "验证通过"
          Write-Host "========================================"

      # 10. 上传构建产物为 Artifact（始终上传，便于调试）
      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: windows-build
          path: |
            release/**/Xiuer-Live-Assistant_*.exe
            release/**/*.zip
            release/**/latest.yml
            release/**/*.blockmap

      # 11. 自动上传到 GitHub Release（仅 tag 触发时）
      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/**/Xiuer-Live-Assistant_*.exe
            release/**/*.zip
            release/**/latest.yml
            release/**/*.blockmap
          fail_on_unmatched_files: false
          # 如果 Release 不存在，自动创建
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 12. 安装并配置 ossutil，然后上传 OSS
      # 只上传发布成品文件，严禁递归上传整个 release 目录
      # 触发条件：tag 推送（正式发布）或 workflow_dispatch（手动验证）
      - name: Install ossutil and upload to OSS
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
        run: |
          # 检查 secrets 是否设置
          if ([string]::IsNullOrEmpty($env:ALIYUN_ACCESS_KEY_ID) -or [string]::IsNullOrEmpty($env:ALIYUN_ACCESS_KEY_SECRET)) {
            Write-Host "⚠️  阿里云 Secrets 未设置，跳过 OSS 上传"
            Write-Host "如需上传 OSS，请在仓库 Settings -> Secrets 中设置:"
            Write-Host "  - ALIYUN_ACCESS_KEY_ID"
            Write-Host "  - ALIYUN_ACCESS_KEY_SECRET"
            exit 0
          }

          # 安装 ossutil
          Write-Host "========================================"
          Write-Host "安装 ossutil"
          Write-Host "========================================"
          $ossutilUrl = "https://gosspublic.alicdn.com/ossutil/1.7.16/ossutil64.zip"
          Invoke-WebRequest -Uri $ossutilUrl -OutFile "ossutil.zip"
          Expand-Archive -Path "ossutil.zip" -DestinationPath "." -Force

          # 查找 ossutil 可执行文件
          $ossutilExe = $null
          if (Test-Path ".\ossutil64\ossutil64.exe") {
            $ossutilExe = ".\ossutil64\ossutil64.exe"
          } elseif (Test-Path ".\ossutil64.exe") {
            $ossutilExe = ".\ossutil64.exe"
          } else {
            $found = Get-ChildItem -Path "." -Filter "ossutil64.exe" -Recurse | Select-Object -First 1
            if ($found) { $ossutilExe = $found.FullName }
          }

          if (-not $ossutilExe) {
            Write-Host "❌ 找不到 ossutil64.exe"
            exit 1
          }
          Write-Host "✅ 找到 ossutil: $ossutilExe"

          # 配置 ossutil
          Write-Host ""
          Write-Host "========================================"
          Write-Host "配置 ossutil"
          Write-Host "========================================"
          & $ossutilExe config -e oss-cn-hangzhou.aliyuncs.com -i $env:ALIYUN_ACCESS_KEY_ID -k $env:ALIYUN_ACCESS_KEY_SECRET -L CH
          if ($LASTEXITCODE -ne 0) {
            Write-Host "❌ OSS 配置失败"
            exit 1
          }
          Write-Host "✅ OSS 配置成功"

          # 打印 release 目录下最终产物清单
          Write-Host ""
          Write-Host "========================================"
          Write-Host "Release output files"
          Write-Host "========================================"
          Get-ChildItem -Path "release" -Recurse | Select-Object -ExpandProperty FullName | ForEach-Object { Write-Host $_ }

          # 显式搜集待上传文件（严禁使用整目录递归上传）
          Write-Host ""
          Write-Host "========================================"
          Write-Host "Selecting files for OSS upload"
          Write-Host "========================================"

          $exeFiles = Get-ChildItem -Path "release" -Recurse -File | Where-Object { $_.Extension -eq ".exe" }
          $ymlFiles = Get-ChildItem -Path "release" -Recurse -File | Where-Object { $_.Name -eq "latest.yml" }
          $blockmapFiles = Get-ChildItem -Path "release" -Recurse -File | Where-Object { $_.Extension -eq ".blockmap" }

          # 检查必需文件
          if (-not $exeFiles -or $exeFiles.Count -eq 0) {
            throw "❌ 未找到 Windows 安装包 .exe，停止上传"
          }
          if (-not $ymlFiles -or $ymlFiles.Count -eq 0) {
            throw "❌ 未找到 latest.yml，停止上传"
          }

          Write-Host ""
          Write-Host "========================================"
          Write-Host "Files selected for OSS upload"
          Write-Host "========================================"
          $exeFiles | ForEach-Object { Write-Host "EXE: $($_.FullName)" }
          $ymlFiles | ForEach-Object { Write-Host "YML: $($_.FullName)" }
          if ($blockmapFiles -and $blockmapFiles.Count -gt 0) {
            $blockmapFiles | ForEach-Object { Write-Host "BLOCKMAP: $($_.FullName)" }
          } else {
            Write-Host "No blockmap files found, skip."
          }

          # 上传文件到 OSS
          $version = "${{ github.ref_name }}"
          $versionedPath = "oss://xiuer-live-tools-download/releases/$version/"
          $latestPath = "oss://xiuer-live-tools-download/releases/latest/"

          # 上传到版本目录
          Write-Host ""
          Write-Host "========================================"
          Write-Host "上传到版本目录: $versionedPath"
          Write-Host "========================================"

          foreach ($file in $exeFiles) {
            Write-Host "上传: $($file.Name)"
            & $ossutilExe cp $file.FullName "$versionedPath$($file.Name)" -f
            if ($LASTEXITCODE -ne 0) { throw "❌ 上传 $($file.Name) 失败" }
          }

          foreach ($file in $ymlFiles) {
            Write-Host "上传: $($file.Name)"
            & $ossutilExe cp $file.FullName "$versionedPath$($file.Name)" -f
            if ($LASTEXITCODE -ne 0) { throw "❌ 上传 $($file.Name) 失败" }
          }

          if ($blockmapFiles -and $blockmapFiles.Count -gt 0) {
            foreach ($file in $blockmapFiles) {
              Write-Host "上传: $($file.Name)"
              & $ossutilExe cp $file.FullName "$versionedPath$($file.Name)" -f
              if ($LASTEXITCODE -ne 0) { throw "❌ 上传 $($file.Name) 失败" }
            }
          }

          Write-Host "✅ 版本目录上传成功"

          # 上传到 latest 目录
          Write-Host ""
          Write-Host "========================================"
          Write-Host "上传到 latest 目录: $latestPath"
          Write-Host "========================================"

          foreach ($file in $exeFiles) {
            Write-Host "上传: $($file.Name)"
            & $ossutilExe cp $file.FullName "$latestPath$($file.Name)" -f
            if ($LASTEXITCODE -ne 0) { throw "❌ 上传 $($file.Name) 到 latest 失败" }
          }

          foreach ($file in $ymlFiles) {
            Write-Host "上传: $($file.Name)"
            & $ossutilExe cp $file.FullName "$latestPath$($file.Name)" -f
            if ($LASTEXITCODE -ne 0) { throw "❌ 上传 $($file.Name) 到 latest 失败" }
          }

          if ($blockmapFiles -and $blockmapFiles.Count -gt 0) {
            foreach ($file in $blockmapFiles) {
              Write-Host "上传: $($file.Name)"
              & $ossutilExe cp $file.FullName "$latestPath$($file.Name)" -f
              if ($LASTEXITCODE -ne 0) { throw "❌ 上传 $($file.Name) 到 latest 失败" }
            }
          }

          Write-Host "✅ latest 目录上传成功"

          Write-Host ""
          Write-Host "========================================"
          Write-Host "OSS 上传完成"
          Write-Host "========================================"
          Write-Host "版本目录: https://xiuer.work/releases/$version/"
          Write-Host "Latest:   https://xiuer.work/releases/latest/"

      # 13. 输出下载地址（tag 触发或 workflow_dispatch 触发时）
      - name: Output download URL
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          Write-Host "========================================"
          Write-Host "Build completed successfully!"
          Write-Host "========================================"
          if ($env:GITHUB_REF -like 'refs/tags/v*') {
            Write-Host "GitHub Release: https://github.com/${{ github.repository }}/releases/tag/$version"
            Write-Host ""
          }
          Write-Host "Download URLs:"
          if ($env:GITHUB_REF -like 'refs/tags/v*') {
            Write-Host "  GitHub:  https://github.com/${{ github.repository }}/releases/tag/$version"
          }
          Write-Host "  Version: https://xiuer.work/releases/$version/"
          Write-Host "  Latest:  https://xiuer.work/releases/latest/"
          Write-Host "========================================"
