# 秀儿直播助手 - Windows 自动发布工作流
# 触发条件：推送 v* 标签（如 v1.2.1）
# 功能：自动构建 Windows 安装包并发布到 GitHub Releases
#
# 注意：macOS 安装包由本地 Mac (M3 Ultra) 构建，不在 CI 中构建
#
# 发布前检查清单：
# 1. 确保 package.json 中的 version 与 tag 一致
# 2. 确保已配置 GitHub Secrets: GITHUB_TOKEN (自动提供)
# 3. 确保已打 tag: git tag v1.2.1 && git push origin v1.2.1

name: Release 秀儿直播助手

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-windows:
    name: Build Windows x64
    runs-on: windows-latest

    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3. 检查环境
      - name: Check environment
        run: |
          node --version
          npm --version
          echo "Platform: Windows x64"

      # 4. 同步 package.json 版本到 tag（v1.2.3 -> 1.2.3）
      - name: Sync package version with tag
        run: node scripts/sync-version-from-tag.cjs

      # 5. 安装依赖
      - name: Install dependencies
        run: npm install

      # 6. 构建应用
      - name: Build application
        run: npx tsc --noEmitOnError false && npx vite build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      # 7. 复制运行时文件
      - name: Copy runtime files
        run: node scripts/copy-runtime-files.cjs

      # 8. 检查构建目录
      - name: Check dist directory
        run: node scripts/dist-check-appdir.js

      # 9. 打包并发布（Windows）
      - name: Build and release (Windows)
        run: npx electron-builder --win nsis zip --x64 --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 10. 上传构建产物（备用）
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-windows-latest
          path: |
            release/**/*.exe
            release/**/*.zip
            release/**/latest.yml
