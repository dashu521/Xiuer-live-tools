# 仅 API，连接外部 MySQL（如阿里云 RDS）。使用：docker compose -f docker-compose.rds.yml up -d
version: "3.8"

services:
  api:
    build:
      context: ../auth-api
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: ${AUTH_API_BASE_IMAGE:-python:3.11-slim}
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - SMS_MODE=${SMS_MODE:-aliyun_dypns}
      - ALIYUN_ACCESS_KEY_ID=${ALIYUN_ACCESS_KEY_ID:-}
      - ALIYUN_ACCESS_KEY_SECRET=${ALIYUN_ACCESS_KEY_SECRET:-}
      - ALIYUN_SMS_SIGN_NAME=${ALIYUN_SMS_SIGN_NAME:-}
      - ALIYUN_SMS_TEMPLATE_CODE=${ALIYUN_SMS_TEMPLATE_CODE:-}
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).status == 200 else 1)",
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
