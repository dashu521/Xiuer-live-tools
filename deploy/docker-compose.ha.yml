# Auth API 高可用部署（双实例 + Nginx + Compose 内置 MySQL）
# 使用：docker compose -f docker-compose.ha.yml up -d

x-api-common: &api-common
  build:
    context: ../auth-api
    dockerfile: Dockerfile
    args:
      BASE_IMAGE: ${AUTH_API_BASE_IMAGE:-python:3.11-slim}
  environment:
    - DATABASE_URL=${DATABASE_URL}
    - JWT_SECRET=${JWT_SECRET}
    - CORS_ORIGINS=${CORS_ORIGINS:-*}
    - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
    - SMS_MODE=${SMS_MODE:-aliyun_dypns}
    - ALIYUN_ACCESS_KEY_ID=${ALIYUN_ACCESS_KEY_ID:-}
    - ALIYUN_ACCESS_KEY_SECRET=${ALIYUN_ACCESS_KEY_SECRET:-}
    - ALIYUN_SMS_SIGN_NAME=${ALIYUN_SMS_SIGN_NAME:-}
    - ALIYUN_SMS_TEMPLATE_CODE=${ALIYUN_SMS_TEMPLATE_CODE:-}
  restart: unless-stopped
  healthcheck:
    test:
      [
        "CMD",
        "python",
        "-c",
        "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).status == 200 else 1)",
      ]
    interval: 10s
    timeout: 3s
    retries: 5
    start_period: 15s
  depends_on:
    mysql:
      condition: service_healthy
  deploy:
    resources:
      limits:
        memory: 256M
      reservations:
        memory: 128M

services:
  api-a:
    <<: *api-common

  api-b:
    <<: *api-common

  gateway:
    image: nginx:1.27-alpine
    depends_on:
      api-a:
        condition: service_healthy
      api-b:
        condition: service_healthy
    ports:
      - "8000:80"
    volumes:
      - ./nginx/auth-api-ha.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-auth_db}
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
    command:
      - --default-authentication-plugin=mysql_native_password
      - --innodb-buffer-pool-size=64M
      - --key-buffer-size=16M
      - --tmp-table-size=16M
      - --max-connections=50
      - --performance-schema=OFF
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

volumes:
  mysql_data:
