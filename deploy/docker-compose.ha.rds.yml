# Auth API 高可用部署（双实例 + Nginx + 外部 RDS）
# 使用：docker compose -f docker-compose.ha.rds.yml up -d

x-api-common: &api-common
  build:
    context: ../auth-api
    dockerfile: Dockerfile
    args:
      BASE_IMAGE: ${AUTH_API_BASE_IMAGE:-python:3.11-slim}
  environment:
    - DATABASE_URL=${DATABASE_URL}
    - JWT_SECRET=${JWT_SECRET}
    - CORS_ORIGINS=${CORS_ORIGINS:-*}
    - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
    - SMS_MODE=${SMS_MODE:-aliyun_dypns}
    - ALIYUN_ACCESS_KEY_ID=${ALIYUN_ACCESS_KEY_ID:-}
    - ALIYUN_ACCESS_KEY_SECRET=${ALIYUN_ACCESS_KEY_SECRET:-}
    - ALIYUN_SMS_SIGN_NAME=${ALIYUN_SMS_SIGN_NAME:-}
    - ALIYUN_SMS_TEMPLATE_CODE=${ALIYUN_SMS_TEMPLATE_CODE:-}
  restart: unless-stopped
  healthcheck:
    test:
      [
        "CMD",
        "python",
        "-c",
        "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).status == 200 else 1)",
      ]
    interval: 10s
    timeout: 3s
    retries: 5
    start_period: 15s
  deploy:
    resources:
      limits:
        memory: 256M
      reservations:
        memory: 128M

services:
  api-a:
    <<: *api-common

  api-b:
    <<: *api-common

  gateway:
    image: nginx:1.27-alpine
    depends_on:
      api-a:
        condition: service_healthy
      api-b:
        condition: service_healthy
    ports:
      - "8000:80"
    volumes:
      - ./nginx/auth-api-ha.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
