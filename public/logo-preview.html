<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>她似直播助手 - LOGO预览</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1E1E1E 0%, #2D2D2D 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }
    
    .container {
      text-align: center;
      max-width: 800px;
    }
    
    .logo-container {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 24px;
      padding: 60px;
      margin-bottom: 40px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .logo-main {
      width: 300px;
      height: 300px;
      margin-bottom: 30px;
    }
    
    .logo-favicon {
      width: 64px;
      height: 64px;
      margin: 0 10px;
    }
    
    h1 {
      color: white;
      font-size: 32px;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #8B5CF6, #EC4899, #F97316);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .subtitle {
      color: rgba(255, 255, 255, 0.6);
      font-size: 16px;
      margin-bottom: 40px;
    }
    
    .sizes {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin-top: 30px;
    }
    
    .size-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    
    .size-label {
      color: rgba(255, 255, 255, 0.5);
      font-size: 12px;
    }
    
    .features {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-top: 40px;
    }
    
    .feature {
      background: rgba(255, 255, 255, 0.05);
      padding: 20px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .feature-icon {
      font-size: 24px;
      margin-bottom: 10px;
    }
    
    .feature-title {
      color: white;
      font-size: 14px;
      margin-bottom: 5px;
    }
    
    .feature-desc {
      color: rgba(255, 255, 255, 0.5);
      font-size: 12px;
    }
    
    .color-palette {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-top: 30px;
      flex-wrap: wrap;
    }
    
    .color-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }
    
    .color-box {
      width: 50px;
      height: 50px;
      border-radius: 8px;
      border: 2px solid rgba(255, 255, 255, 0.2);
    }
    
    .color-code {
      color: rgba(255, 255, 255, 0.6);
      font-size: 11px;
      font-family: monospace;
    }
    
    .color-name {
      color: rgba(255, 255, 255, 0.4);
      font-size: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-container">
      <!-- 主LOGO -->
      <svg class="logo-main" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#F5A623;stop-opacity:1" />
            <stop offset="50%" style="stop-color:#E8873A;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#D4691A;stop-opacity:1" />
          </linearGradient>
          <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#1E1E1E;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#2D2D2D;stop-opacity:1" />
          </linearGradient>
          <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
            <feMerge>
              <feMergeNode in="coloredBlur"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
        </defs>
        
        <circle cx="256" cy="256" r="240" fill="url(#bgGradient)"/>
        <circle cx="256" cy="256" r="220" stroke="url(#mainGradient)" stroke-width="4" fill="none" opacity="0.5"/>
        <circle cx="256" cy="256" r="200" stroke="url(#mainGradient)" stroke-width="2" fill="none" opacity="0.25"/>
        
        <g transform="translate(256, 256)">
          <circle cx="0" cy="0" r="120" fill="none" stroke="url(#mainGradient)" stroke-width="8" opacity="0.6" filter="url(#glow)"/>
          <circle cx="0" cy="0" r="100" fill="url(#mainGradient)" opacity="0.1"/>
          <circle cx="0" cy="0" r="90" fill="url(#mainGradient)" opacity="0.15"/>
          <path d="M-35 -50 L45 0 L-35 50 Z" fill="url(#mainGradient)" filter="url(#glow)"/>
          <circle cx="65" cy="-65" r="12" fill="#EF4444" filter="url(#glow)">
            <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
          </circle>
          <g stroke="url(#mainGradient)" stroke-width="3" stroke-linecap="round" opacity="0.5">
            <line x1="-80" y1="-80" x2="-50" y2="-50"/>
            <line x1="80" y1="-80" x2="50" y2="-50"/>
            <line x1="-80" y1="80" x2="-50" y2="50"/>
            <line x1="80" y1="80" x2="50" y2="50"/>
          </g>
        </g>
      </svg>
      
      <h1 style="background: linear-gradient(135deg, #F5A623, #E8873A, #D4691A); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">秀儿直播助手</h1>
      <p class="subtitle">专业直播助手工具 - 让直播更轻松</p>
      
      <!-- 不同尺寸展示 -->
      <div class="sizes">
        <div class="size-item">
          <svg class="logo-favicon" style="width:32px;height:32px;" viewBox="0 0 256 256">
            <circle cx="128" cy="128" r="120" fill="url(#bgGradient)"/>
            <circle cx="128" cy="128" r="110" stroke="url(#mainGradient)" stroke-width="3" fill="none" opacity="0.6"/>
            <circle cx="128" cy="128" r="50" fill="url(#mainGradient)" opacity="0.15"/>
            <path d="M108 98 L148 128 L108 158 Z" fill="url(#mainGradient)"/>
            <circle cx="165" cy="65" r="8" fill="#EF4444"/>
          </svg>
          <span class="size-label">32px</span>
        </div>
        <div class="size-item">
          <svg class="logo-favicon" viewBox="0 0 256 256">
            <circle cx="128" cy="128" r="120" fill="url(#bgGradient)"/>
            <circle cx="128" cy="128" r="110" stroke="url(#mainGradient)" stroke-width="3" fill="none" opacity="0.6"/>
            <circle cx="128" cy="128" r="50" fill="url(#mainGradient)" opacity="0.15"/>
            <path d="M108 98 L148 128 L108 158 Z" fill="url(#mainGradient)"/>
            <circle cx="165" cy="65" r="8" fill="#EF4444"/>
          </svg>
          <span class="size-label">64px</span>
        </div>
        <div class="size-item">
          <svg class="logo-favicon" style="width:128px;height:128px;" viewBox="0 0 256 256">
            <circle cx="128" cy="128" r="120" fill="url(#bgGradient)"/>
            <circle cx="128" cy="128" r="110" stroke="url(#mainGradient)" stroke-width="3" fill="none" opacity="0.6"/>
            <circle cx="128" cy="128" r="50" fill="url(#mainGradient)" opacity="0.15"/>
            <path d="M108 98 L148 128 L108 158 Z" fill="url(#mainGradient)"/>
            <circle cx="165" cy="65" r="8" fill="#EF4444"/>
          </svg>
          <span class="size-label">128px</span>
        </div>
      </div>
    </div>
    
    <!-- 配色方案 - 与项目主题色一致 -->
    <div class="color-palette">
      <div class="color-item">
        <div class="color-box" style="background:#F5A623;"></div>
        <span class="color-code">#F5A623</span>
        <span class="color-name">主色亮</span>
      </div>
      <div class="color-item">
        <div class="color-box" style="background:#E8873A;"></div>
        <span class="color-code">#E8873A</span>
        <span class="color-name">主色</span>
      </div>
      <div class="color-item">
        <div class="color-box" style="background:#D4691A;"></div>
        <span class="color-code">#D4691A</span>
        <span class="color-name">主色暗</span>
      </div>
      <div class="color-item">
        <div class="color-box" style="background:#1E1E1E;"></div>
        <span class="color-code">#1E1E1E</span>
        <span class="color-name">背景深</span>
      </div>
      <div class="color-item">
        <div class="color-box" style="background:#2D2D2D;"></div>
        <span class="color-code">#2D2D2D</span>
        <span class="color-name">背景浅</span>
      </div>
      <div class="color-item">
        <div class="color-box" style="background:#EF4444;"></div>
        <span class="color-code">#EF4444</span>
        <span class="color-name">直播指示</span>
      </div>
    </div>
    
    <!-- 设计特点 -->
    <div class="features">
      <div class="feature">
        <div class="feature-icon">🎥</div>
        <div class="feature-title">播放按钮</div>
        <div class="feature-desc">代表直播、播放核心功能</div>
      </div>
      <div class="feature">
        <div class="feature-icon">🔴</div>
        <div class="feature-title">直播指示</div>
        <div class="feature-desc">红色呼吸灯表示正在直播</div>
      </div>
      <div class="feature">
        <div class="feature-icon">✨</div>
        <div class="feature-title">渐变色彩</div>
        <div class="feature-desc">紫粉橙渐变代表活力与专业</div>
      </div>
    </div>
  </div>
</body>
</html>
