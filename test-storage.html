<!DOCTYPE html>
<html>
<head>
    <title>Storage Test</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1a1a1a; color: #00ff00; }
        h2 { color: #ffff00; }
        .key { color: #00ffff; }
        .value { color: #ff00ff; word-break: break-all; }
        pre { background: #2a2a2a; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
    <h2>localStorage 存储键列表</h2>
    <div id="output"></div>
    <script>
        const output = document.getElementById('output');
        const keys = [];
        for (let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);
            const value = localStorage.getItem(key);
            keys.push({ key, value: value.substring(0, 500) });
        }
        
        // 按类型分组
        const groups = {
            '账号相关': keys.filter(k => k.key.includes('accounts-storage')),
            '平台偏好': keys.filter(k => k.key.includes('platform-pref')),
            '认证相关': keys.filter(k => k.key.includes('auth')),
            '业务配置': keys.filter(k => /auto-|chrome-|live-|sub-/.test(k.key)),
            '其他': keys.filter(k => !k.key.match(/accounts-storage|platform-pref|auth|auto-|chrome-|live-|sub-/))
        };
        
        let html = '';
        for (const [groupName, groupKeys] of Object.entries(groups)) {
            if (groupKeys.length === 0) continue;
            html += `<h3>${groupName} (${groupKeys.length}个)</h3>`;
            html += '<pre>';
            groupKeys.forEach(({ key, value }) => {
                html += `<span class="key">${key}</span>: `;
                try {
                    const parsed = JSON.parse(value);
                    html += `<span class="value">${JSON.stringify(parsed, null, 2).substring(0, 300)}...</span>\n`;
                } catch {
                    html += `<span class="value">${value.substring(0, 100)}...</span>\n`;
                }
            });
            html += '</pre>';
        }
        
        output.innerHTML = html || '<p>localStorage 为空</p>';
    </script>
</body>
</html>
